{% set version = environ.get("VERSION", "0.0.0") %}

package:
  name: brightpath
  version: {{ version }}

source:
  path: ..

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install --no-deps --ignore-installed . -vv
  script_env:
    - VERSION
    - CONDA_BLD_PATH

requirements:
  host:
    - python >=3.10,<3.12
    - pip
    - setuptools
    - wheel
    - pyyaml
    - xlsxwriter >=3
  run:
    - python >=3.10,<3.12
    - bw2io
    - pyyaml
    - xlsxwriter >=3

test:
  imports:
    - brightpath
    - yaml
  requires:
    # Ensure the test env uses a Python version where bw2io wheels/conda pkgs exist
    - python >=3.10,<3.12
    - pytest
    - bw2io
    - xlsxwriter >=3

about:
  home: https://github.com/romainsacchi/brightpath
  license: BSD-3-Clause
  license_family: BSD
  summary: 'Validate, migrate, and exchange life-cycle inventories across LCA formats.'
