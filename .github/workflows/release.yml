name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
      - "[0-9]*.[0-9]*.[0-9]*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0"
        required: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check formatting
        run: |
          python -m black --check brightpath tests
          python -m isort --check-only brightpath tests

      - name: Lint
        run: python -m ruff check brightpath tests

      - name: Security scan
        run: python -m bandit -r brightpath

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest --cov=brightpath

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: [quality, test]
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine release version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Validate project version
        shell: bash
        run: |
          PROJECT_VERSION="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as handle:
              print(tomllib.load(handle)["project"]["version"])
          PY
          )"
          if [[ "${PROJECT_VERSION}" != "${VERSION}" ]]; then
            echo "Tag/release version ${VERSION} does not match pyproject.toml version ${PROJECT_VERSION}."
            exit 1
          fi

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build PyPI distributions
        run: python -m build --sdist --wheel --outdir dist .

      - name: Check PyPI distributions
        run: python -m twine check dist/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: pypi-dist
          path: dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: ${{ secrets.PYPI_USER }}
          password: ${{ secrets.PYPI_PASSWORD }}
          skip-existing: true

  publish-anaconda:
    name: Publish to Anaconda
    runs-on: ubuntu-latest
    needs: build
    environment: anaconda
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.11"
          channels: conda-forge,cmutel,konstantinstadler,haasad,pascallesage,romainsacchi
          channel-priority: strict
          auto-update-conda: true

      - name: Build and upload conda package
        shell: bash -l {0}
        env:
          VERSION: ${{ needs.build.outputs.version }}
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_CLOUD }}
          ANACONDA_USER: ${{ vars.ANACONDA_USER || 'romainsacchi' }}
        run: |
          conda install -y anaconda-client conda-build
          mkdir -p "${HOME}/conda-bld"
          conda config --set anaconda_upload no
          export CONDA_BLD_PATH="${HOME}/conda-bld"
          conda build conda/ --old-build-string
          anaconda -t "${ANACONDA_API_TOKEN}" upload \
            -u "${ANACONDA_USER}" \
            "${CONDA_BLD_PATH}/noarch/brightpath-${VERSION}-py_0.tar.bz2" \
            --force
